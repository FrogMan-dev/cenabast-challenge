name: 'Continuous Delivery'
on:
  push:
    branches: ['main']

env:
  PROJECT_ID: prj-challenge-fs
  REGION: us-central1
  SERVICE_NAME: cenabast-challenge-api
  SA_EMAIL: sa-check-api-11124527@prj-challenge-fs.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Diagnostico - roles IAM asignados a esta Service Account
        run: |
          gcloud projects get-iam-policy $PROJECT_ID \
            --flatten="bindings[].members" \
            --filter="bindings.members:${SA_EMAIL}" \
            --format="table(bindings.role)"

      - name: Diagnostico - repos existentes (todas las regiones)
        run: gcloud artifacts repositories list --project=$PROJECT_ID || true

      - name: Deploy a Cloud Run via Cloud Build (--source)
        run: |
          gcloud run deploy $SERVICE_NAME \
            --source . \
            --region=$REGION \
            --project=$PROJECT_ID \
            --platform=managed \
            --allow-unauthenticated \
            --quiet

      - name: Mostrar URL del servicio
        run: |
          gcloud run services describe $SERVICE_NAME \
            --region $REGION --project $PROJECT_ID \
            --format='value(status.url)'
