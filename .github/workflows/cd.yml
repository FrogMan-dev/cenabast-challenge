name: 'Continuous Delivery'
on:
  push:
    branches: ['main']

env:
  PROJECT_ID: prj-challenge-fs
  REGION: southamerica-west1
  REPO: challenge-repo
  SERVICE_NAME: cenabast-challenge-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build de la imagen Docker
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/api:${{ github.sha }} .

      - name: Push de la imagen a Artifact Registry
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/api:${{ github.sha }}

      - name: Deploy a Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/api:${{ github.sha }} \
            --region=$REGION \
            --project=$PROJECT_ID \
            --platform=managed \
            --allow-unauthenticated \
            --quiet

      - name: Mostrar URL del servicio
        run: |
          gcloud run services describe $SERVICE_NAME \
            --region $REGION --project $PROJECT_ID \
            --format='value(status.url)'
