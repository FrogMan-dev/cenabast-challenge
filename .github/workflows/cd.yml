name: 'Continuous Delivery'
on:
  push:
    branches: ['main']

env:
  PROJECT_ID: prj-challenge-fs
  REGION: us-central1
  SERVICE_NAME: cenabast-challenge-api
  REPO: cenabast-challenge

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Diagnostico 1 - repos en todas las regiones
        continue-on-error: true
        run: gcloud artifacts repositories list --project=$PROJECT_ID

      - name: Diagnostico 2 - servicios/APIs habilitadas
        continue-on-error: true
        run: gcloud services list --project=$PROJECT_ID --enabled

      - name: Diagnostico 3 - servicios Cloud Run existentes
        continue-on-error: true
        run: gcloud run services list --project=$PROJECT_ID --region=$REGION

      - name: Configurar Docker para Artifact Registry
        continue-on-error: true
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Intento A - build y push a repo propio (sin crear)
        continue-on-error: true
        run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/api:${{ github.sha }} .
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/api:${{ github.sha }}

      - name: Intento B - deploy via Cloud Build (--source)
        continue-on-error: true
        run: |
          gcloud run deploy $SERVICE_NAME \
            --source . \
            --region=$REGION \
            --project=$PROJECT_ID \
            --platform=managed \
            --allow-unauthenticated \
            --quiet

      - name: Mostrar URL del servicio (si algo funciono)
        continue-on-error: true
        run: |
          gcloud run services describe $SERVICE_NAME \
            --region $REGION --project $PROJECT_ID \
            --format='value(status.url)'
